<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Library</title>

<script>
const folders = [
	`שיעור פשוט שו''ט של הגמרא של לפירות ירדתי`,
	`example`
];
</script>	
<style>
body{
    font-family: Arial;
    margin:40px;
    background:#f6f6f6;
	height: calc(100vh - 80px);	
	direction: rtl;
}

h1{
    margin-bottom:10px;
}

#title {
	margin: 1.5em;
}

#link {
    flex: 1;
    text-align: end;
    font-size: 1em;
}

#heading {
	display: flex;
    align-items: baseline;
}

#wrapper {
    display: flex;
    height: 100%;
}

#search::after {
	content: " ";
}

#search{
    padding: 0.5em;
    width: 14em;
    font-size: 16px;
    border: none;
    height: 2em;
    border-bottom: 1px solid #a5a5a5;
    width: calc(100% - 1em);
}

#library{
	border: 2px solid #a5a5a5;	
    width: 20em;
    position: relative;
}

.keyboard {
	display: flex;
	flex-wrap: wrap;
	gap: 8px;
	max-width: 600px; /* adjust as needed */
	position: absolute;
	bottom: 0;
}

.key {
	flex: 1 1 calc(10% - 8px); /* controls how many per row */
	min-width: 50px;
	padding: 0.2em 0;
	text-align: center;
	background: #e0e0e0;
	border-radius: 1em;
	cursor: pointer;
	user-select: none;
	font-size: 18px;
	transition: background 0.2s;
}

.key:hover {
	background: #d5d5d5;
}

.key:active {
	background: #c8c8c8;
}

#recordingList{
    background: white;
    overflow-y: scroll;
    height: calc(100vh - 3em - 84px - 16em);
}

.recording{
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #a5a5a5;
}

.recording:hover{
    background:#f0f0f0;
}

#playerArea{
    background: white;
    padding-left: 20px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    flex: 1;
}

#sources{
    white-space: pre-line;
    font-family: monospace;
    flex: 1;
    margin: 2em;
    overflow-y: scroll;
    border-bottom: 2px solid black;
    border-top: 2px solid black;
    font-size: 1.5em;
}
</style>
</head>

<body>

<div id="wrapper">
	<div id="library">
		<input id="search" placeholder="Search">
		<div id="recordingList"></div>
		<div class="keyboard">
		  <!-- Hebrew letters -->
		  <div class="key">א</div>
		  <div class="key">ב</div>
		  <div class="key">ג</div>
		  <div class="key">ד</div>
		  <div class="key">ה</div>
		  <div class="key">ו</div>
		  <div class="key">ז</div>
		  <div class="key">ח</div>
		  <div class="key">ט</div>
		  <div class="key">י</div>
		  <div class="key">כ</div>
		  <div class="key">ל</div>
		  <div class="key">מ</div>
		  <div class="key">נ</div>
		  <div class="key">ס</div>
		  <div class="key">ע</div>
		  <div class="key">פ</div>
		  <div class="key">צ</div>
		  <div class="key">ק</div>
		  <div class="key">ר</div>
		  <div class="key">ש</div>
		  <div class="key">ת</div>

		  <!-- Extras -->
		  <div class="key">'</div>
		  <div class="key">"</div>
		  <div class="key">␣</div> <!-- space -->
		</div>
	</div>

	<div id="playerArea">
		<div id="heading">
			<h2 id="title">Select a recording</h2>
			<a id="link">View Source</a>
		</div>
		<div id="sources"></div>
		<audio id="player" controls style="width:100%"></audio>
	</div>
</div>


<script>
const recordingList = document.getElementById("recordingList");
	const keys = document.querySelectorAll('.key');
	const search = document.getElementById("search");	
	let recordings = null;

  keys.forEach(key => {
    key.addEventListener('click', () => {
		console.log(key.textContent);
      const char = key.textContent === '␣' ? ' ' : key.textContent;

      // Insert at cursor position
      const start = search.selectionStart;
      const end = search.selectionEnd;
      const value = search.value;

      search.value = value.slice(0, start) + char + value.slice(end);

      // Move cursor after inserted character
      search.selectionStart = search.selectionEnd = start + char.length;

      // Keep focus
      search.focus();
		filter();
    });
  });
	
async function init() {
    await loadRecordings(folders).then(data => {
		console.log(data);
		recordings = data;
	});
    renderRecordings(recordings)
}

init();

async function loadRecordings(folders) {
    const promises = folders.map(async (folder) => {
        const basePath = `/content/${folder}/`;

        try {
            const [sources, link] = await Promise.all([
                fetch(basePath + 'mm.txt').then(r => r.text()),
                fetch(basePath + 'thd.txt').then(r => r.text())
            ]);

            return {
                title: folder, // or format this if needed
                audio: basePath + 'audio.mp3',
                sources: sources.trim(),
                link: link.trim()
            };

        } catch (err) {
            console.error(`Error loading ${folder}:`, err);
            return null;
        }
    });

    const results = await Promise.all(promises);

    // Remove failed entries
    return results.filter(r => r !== null);
}
	

function renderRecordings(list){
	recordingList.innerHTML="";
	list.forEach(recording => {
		const div = document.createElement("div");
		div.className="recording";
		div.textContent=recording.title;
		div.onclick=()=>loadRecording(recording);
		recordingList.appendChild(div);
	});
}

function loadRecording(recording){
	document.getElementById("title").textContent = recording.title;
	document.getElementById("player").src = recording.audio;
	document.getElementById("sources").textContent = recording.sources;
	document.getElementById("link").href = recording.link;
}

search.addEventListener("input", filter);

	function filter(){
		const q = search.value.toLowerCase();
		const filtered = recordings.filter(s =>
			s.title.toLowerCase().includes(q)
		);
		renderRecordings(filtered);
	}
</script>

</body>
</html>
